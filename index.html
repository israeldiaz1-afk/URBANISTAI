<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UrbanistAI">
  <title>UrbanistAI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!--
    #app lleva la clase "tool-XXX" del herramienta activa.
    El CSS la usa para cambiar cursores, mostrar/ocultar la barra
    de propiedades y resaltar el botón activo.
  -->
  <div id="app" class="tool-pan">

    <!-- ── Zona del canvas ─────────────────────────────────── -->
    <div class="canvas-area">
      <canvas id="canvas"></canvas>
      <!-- Canvas overlay para el trazo en curso.
           pointer-events:none para que los toques pasen al canvas de abajo. -->
      <canvas id="preview-canvas"></canvas>

      <!-- Pantalla de bienvenida (se oculta al cargar foto) -->
      <div id="empty-state">
        <svg class="empty-icon" viewBox="0 0 80 80" fill="none" aria-hidden="true">
          <rect x="0"  y="32" width="80" height="16" rx="2" fill="currentColor" opacity="0.12"/>
          <rect x="32" y="0"  width="16" height="80" rx="2" fill="currentColor" opacity="0.12"/>
          <rect x="32" y="32" width="16" height="16"         fill="currentColor" opacity="0.06"/>
          <rect x="37" y="4"  width="6"  height="12" rx="3" fill="currentColor" opacity="0.30"/>
          <rect x="37" y="64" width="6"  height="12" rx="3" fill="currentColor" opacity="0.30"/>
          <rect x="4"  y="37" width="12" height="6"  rx="3" fill="currentColor" opacity="0.30"/>
          <rect x="64" y="37" width="12" height="6"  rx="3" fill="currentColor" opacity="0.30"/>
          <circle cx="16" cy="16" r="8" fill="currentColor" opacity="0.20"/>
          <circle cx="64" cy="64" r="8" fill="currentColor" opacity="0.20"/>
        </svg>
        <p>Sube una foto de calle<br>para empezar a prototipar</p>
        <button class="empty-cta" id="btn-empty-upload">
          <!-- camera icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Elegir foto
        </button>
      </div>
    </div>

    <!-- ── Controles inferiores ────────────────────────────── -->
    <div id="controls">

      <!-- Barra de propiedades del trazo.
           Visible solo cuando hay una herramienta de dibujo activa
           (CSS: .tool-pan #props-bar { display:none }) -->
      <div id="props-bar">

        <!-- Selector de color (input nativo, estilizado como círculo) -->
        <label id="color-label" title="Color del trazo" aria-label="Color del trazo">
          <input type="color" id="color-picker" value="#3b82f6">
        </label>

        <!-- Grosor del trazo -->
        <div class="prop-group">
          <!-- Icono: tres líneas de diferente grosor -->
          <svg class="prop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" aria-hidden="true">
            <line x1="3" y1="7"  x2="21" y2="7"  stroke-width="1.5"/>
            <line x1="3" y1="13" x2="21" y2="13" stroke-width="3"/>
            <line x1="3" y1="19" x2="21" y2="19" stroke-width="5"/>
          </svg>
          <input type="range" id="stroke-width" min="1" max="50" value="5" step="1" aria-label="Grosor del trazo">
          <span id="width-val" class="prop-val">5</span>
        </div>

        <!-- Opacidad -->
        <div class="prop-group">
          <!-- Icono: cuadrado semitransparente -->
          <svg class="prop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
          </svg>
          <input type="range" id="stroke-opacity" min="5" max="100" value="100" step="5" aria-label="Opacidad del trazo">
          <span id="opacity-val" class="prop-val">100%</span>
        </div>

        <!-- Limpiar toda la capa de dibujo -->
        <button id="btn-clear" class="icon-btn danger" title="Limpiar todo el dibujo" disabled aria-label="Limpiar dibujo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div><!-- /#props-bar -->

      <!-- Barra de herramientas principal -->
      <nav id="toolbar" aria-label="Herramientas">
        <input type="file" id="file-input" accept="image/*" hidden aria-hidden="true">

        <!-- Botón principal: cargar foto (siempre visible, estilo primario) -->
        <button id="btn-upload" class="tool-btn primary" title="Subir foto" aria-label="Subir foto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Foto</span>
        </button>

        <div class="tool-separator" role="separator"></div>

        <!-- Herramienta: Mover / Pan -->
        <button data-tool="pan" class="tool-btn" title="Mover (arrastrar la foto)" aria-label="Mover">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="5 9 2 12 5 15"/>
            <polyline points="9 5 12 2 15 5"/>
            <polyline points="15 19 12 22 9 19"/>
            <polyline points="19 9 22 12 19 15"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <line x1="12" y1="2" x2="12" y2="22"/>
          </svg>
        </button>

        <!-- Herramienta: Pincel libre -->
        <button data-tool="pen" class="tool-btn" title="Pincel libre" aria-label="Pincel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>

        <!-- Herramienta: Línea recta -->
        <button data-tool="line" class="tool-btn" title="Línea recta" aria-label="Línea">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="5" y1="19" x2="19" y2="5"/>
            <circle cx="5"  cy="19" r="2" fill="currentColor" stroke="none"/>
            <circle cx="19" cy="5"  r="2" fill="currentColor" stroke="none"/>
          </svg>
        </button>

        <!-- Herramienta: Rectángulo -->
        <button data-tool="rect" class="tool-btn" title="Rectángulo" aria-label="Rectángulo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="1"/>
          </svg>
        </button>

        <!-- Herramienta: Elipse -->
        <button data-tool="ellipse" class="tool-btn" title="Elipse / Círculo" aria-label="Elipse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <ellipse cx="12" cy="12" rx="9" ry="6"/>
          </svg>
        </button>

        <!-- Herramienta: Goma de borrar -->
        <button data-tool="eraser" class="tool-btn" title="Goma de borrar" aria-label="Goma">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/>
            <path d="M6.5 17.5l4-4"/>
          </svg>
        </button>

        <!-- Separador flexible -->
        <div class="toolbar-spacer"></div>

        <!-- Deshacer (Ctrl+Z) -->
        <button id="btn-undo" class="icon-btn" title="Deshacer (Ctrl+Z)" disabled aria-label="Deshacer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.51"/>
          </svg>
        </button>

        <!-- Rehacer (Ctrl+Y) -->
        <button id="btn-redo" class="icon-btn" title="Rehacer (Ctrl+Y)" disabled aria-label="Rehacer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-.49-4.51"/>
          </svg>
        </button>
      </nav><!-- /#toolbar -->

    </div><!-- /#controls -->
  </div><!-- /#app -->

  <script src="app.js"></script>
</body>
</html>
